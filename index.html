<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Joy Igbonekwu — Backend Engineer. Portfolio of backend work completed during HNG Internship." />
  <title>Joy Igbonekwu — Backend Engineer</title>

  <!-- Bootstrap 5 -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Nav -->
  <div id="nav-placeholder"></div>
  <script>
    fetch('nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('nav-placeholder').innerHTML = html;
      });
  </script>

  <!-- Hero -->
  <div id="hero-placeholder"></div>
  <script>
    fetch('hero.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('hero-placeholder').innerHTML = html;
      });
  </script>

  <!-- Projects -->
  <div id="projects-placeholder"></div>
  <script>
    fetch('projects.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('projects-placeholder').innerHTML = html;
      });
  </script>

  <!-- Skills -->
  <div id="skills-placeholder"></div>
   <script>
     fetch('skills.html')
       .then(res => res.text())
       .then(html => {
         document.getElementById('skills-placeholder').innerHTML = html;
       });
   </script>

  <!-- Deep Dive -->
  <div id="dive-placeholder"></div>
  <script>
    fetch('dive.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('dive-placeholder').innerHTML = html;  
      });
  </script>

  <!-- Reflection -->
  <div id="reflection-placeholder"></div>
  <script>
    fetch('reflection.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('reflection-placeholder').innerHTML = html;
      });
  </script>

  <!-- Contact -->
  <div id="contact-placeholder"></div>
  <script>
    fetch('contact.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('contact-placeholder').innerHTML = html;
      });
  </script>

  <!-- Screenshot lightbox (project gallery) -->
  <div id="screenshot-modal" class="screenshot-modal" hidden aria-hidden="true">
    <div class="screenshot-modal__backdrop" data-close-modal></div>
    <div
      class="screenshot-modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="screenshot-modal-title"
    >
      <button type="button" class="screenshot-modal__close" aria-label="Close gallery" data-close-modal>&times;</button>
      <h2 id="screenshot-modal-title" class="screenshot-modal__title"></h2>
      <div class="screenshot-modal__viewport">
        <button type="button" class="screenshot-modal__nav screenshot-modal__nav--prev" aria-label="Previous image" hidden>&lsaquo;</button>
        <div class="screenshot-modal__track" tabindex="0"></div>
        <button type="button" class="screenshot-modal__nav screenshot-modal__nav--next" aria-label="Next image" hidden>&rsaquo;</button>
      </div>
      <p class="screenshot-modal__counter" hidden></p>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('footer.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('footer-placeholder').innerHTML = html;
      });
  </script>
  
  <!-- Bootstrap 5 JS bundle (includes Popper) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmAtBcQCZaTGJ3g1JBjc8Z8cWCG0"
    crossorigin="anonymous"
  ></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>
</body>
</html>
